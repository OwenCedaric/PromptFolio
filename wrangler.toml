name = "promptfolio"
compatibility_date = "2024-04-05"
pages_build_output_dir = "dist"

[vars]
SITE_URL = "${SITE_URL}"
SITE_PASSWORD = "${SITE_PASSWORD}"
GEMINI_MODEL = "${GEMINI_MODEL}"
GEMINI_API_KEY = "${GEMINI_API_KEY}"

[[d1_databases]]
binding = "DB"
database_name = "${DB_NAME}"
database_id = "${DB_ID}"
