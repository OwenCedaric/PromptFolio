<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO 占位符 - 将由 Cloudflare Edge 函数动态替换 -->
    <title>PromptFolio - 专业 AI 提示词管理</title>
    <meta name="description" content="一个专业的 AI Prompt 管理网站，支持版本控制、分类标签和 Gemini 智能优化。" />
    <meta property="og:title" content="PromptFolio" />
    <meta property="og:description" content="专业 AI Prompt 管理系统" />
    <meta property="og:image" content="/favicon.svg" />
    <meta property="og:type" content="website" />
    
    <!-- JSON-LD 注入点 -->
    <script type="application/ld+json" id="seo-json-ld">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "PromptFolio",
      "url": "https://promptfolio.pages.dev"
    }
    </script>

    <!-- Performance Optimizations -->
    <link rel="preconnect" href="https://wsrv.nl" crossorigin />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <script>
      (function() {
        try {
          const localTheme = localStorage.getItem('pf_theme');
          const supportDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (localTheme === 'dark' || (!localTheme && supportDarkMode)) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
          }
        } catch (e) {}
      })();
    </script>
    <style>
      #root { isolation: isolate; }
      .sk-pulse { animation: sk-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      @keyframes sk-pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
  </head>
  <body class="bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100 antialiased font-sans transition-colors duration-300 overflow-hidden h-dvh w-full">
    <div id="root" class="h-full w-full"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
