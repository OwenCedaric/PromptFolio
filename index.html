<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Dynamic SEO Meta Tags (Populated at the Edge) -->
    <title>SITE_TITLE_PLACEHOLDER</title>
    <meta name="description" content="SITE_DESCRIPTION_PLACEHOLDER" />
    <meta name="keywords" content="prompt engineering, AI prompts, Gemini API, prompt manager" />
    
    <!-- Open Graph / Social -->
    <meta property="og:title" content="SITE_TITLE_PLACEHOLDER" />
    <meta property="og:description" content="SITE_DESCRIPTION_PLACEHOLDER" />
    <meta property="og:type" content="website" />
    
    <!-- Performance Optimizations -->
    <link rel="preconnect" href="https://wsrv.nl" crossorigin />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#09090b" />

    <!-- Theme Initialization -->
    <script>
      (function() {
        try {
          const localTheme = localStorage.getItem('pf_theme');
          const supportDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (localTheme === 'dark' || (!localTheme && supportDarkMode)) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
          }
        } catch (e) {}
      })();
    </script>
    <style>
      #root { isolation: isolate; }
      .sk-header { height: 73px; border-bottom: 1px solid rgba(228,228,231,0.5); }
      .dark .sk-header { border-bottom: 1px solid rgba(39,39,42,0.5); }
      .sk-grid { display: grid; gap: 1.5rem; padding: 1.5rem; grid-template-columns: 1fr; }
      @media (min-width: 768px) { .sk-grid { grid-template-columns: repeat(2, 1fr); } }
      .sk-card { height: 280px; border-radius: 1rem; background-color: #ffffff; border: 1px solid #e4e4e7; }
      .dark .sk-card { background-color: #09090b; border: 1px solid #27272a; }
      .sk-pulse { animation: sk-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      @keyframes sk-pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
      .seo-content { display: none; }
    </style>
</head>
  <body class="bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100 antialiased font-sans transition-colors duration-300 overflow-hidden h-dvh w-full">
    
    <!-- Static Content for SEO Crawlers (Injected at the Edge) -->
    <noscript>
        <div class="seo-content">
            <h1>SITE_TITLE_PLACEHOLDER</h1>
            <p>SITE_DESCRIPTION_PLACEHOLDER</p>
            <article>SITE_BODY_PLACEHOLDER</article>
        </div>
    </noscript>

    <div id="root" class="h-full w-full overflow-hidden flex flex-col">
      <!-- App Skeleton -->
      <div class="w-full h-full flex bg-zinc-50 dark:bg-zinc-950">
         <div class="hidden md:block w-64 border-r border-zinc-200 dark:border-zinc-800 h-full bg-white dark:bg-zinc-900 shrink-0"></div>
         <div class="flex-1 flex flex-col h-full overflow-hidden">
            <div class="sk-header w-full bg-zinc-50/95 dark:bg-zinc-950/95 shrink-0"></div>
            <div class="flex-1 p-6 overflow-hidden">
                <div class="sk-grid">
                    <div class="sk-card sk-pulse"></div>
                    <div class="sk-card sk-pulse"></div>
                    <div class="sk-card sk-pulse hidden md:block"></div>
                </div>
            </div>
         </div>
      </div>
    </div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
