    <title>PromptFolio - AI Prompt Manager</title>

    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />
    
    <!-- Performance Optimizations -->
    <link rel="preconnect" href="https://wsrv.nl" crossorigin />
    <link rel="dns-prefetch" href="https://wsrv.nl" />

    <!-- Theme Initialization Script (Prevents FOUC) -->
    <script>
      (function() {
        try {
          const localTheme = localStorage.getItem('pf_theme');
          const supportDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const shouldBeDark = localTheme === 'dark' || (!localTheme && supportDarkMode);
          
          if (shouldBeDark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
          } else {
            document.documentElement.classList.remove('dark');
            document.documentElement.style.colorScheme = 'light';
          }
        } catch (e) {}
      })();
    </script>
    <style>
      /* Ensure root takes full height for app-like feel */
      #root {
        isolation: isolate;
      }
      /* Critical CSS for Skeleton */
      .sk-header { height: 73px; border-bottom: 1px solid rgba(228,228,231,0.5); }
      .dark .sk-header { border-bottom: 1px solid rgba(39,39,42,0.5); }
      .sk-grid { display: grid; gap: 1.5rem; padding: 1.5rem; grid-template-columns: 1fr; }
      @media (min-width: 768px) { .sk-grid { grid-template-columns: repeat(2, 1fr); } }
      @media (min-width: 1280px) { .sk-grid { grid-template-columns: repeat(3, 1fr); } }
      .sk-card { height: 280px; border-radius: 1rem; background-color: #ffffff; border: 1px solid #e4e4e7; }
      .dark .sk-card { background-color: #09090b; border: 1px solid #27272a; }
      .sk-pulse { animation: sk-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      @keyframes sk-pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
